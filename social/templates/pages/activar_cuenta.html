{% extends 'base.html' %}
{% load static %}

{% block main_content %}
<div class="activation-container">
    <div class="activation-card">
        <h1>Activar Cuenta</h1>
        <p class="subtitle">Completa el formulario para crear tu cuenta</p>

        {% if messages %}
        <div class="alerts-container">
            {% for message in messages %}
            <div class="alert alert-{% if message.tags %}{{ message.tags }}{% else %}info{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" class="activation-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">Nombre de Usuario *</label>
                <input type="text" id="username" name="username" required placeholder="Tu nombre de usuario">
            </div>

            <div class="form-group">
                <label for="password">Contraseña (mínimo 8 caracteres) *</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <div class="form-group">
                <label for="password_confirm">Confirmar Contraseña *</label>
                <input type="password" id="password_confirm" name="password_confirm" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary">Crear Cuenta</button>
        </form>

        <p class="login-link">¿Ya tienes cuenta? <a href="{% url 'pages:login' %}">Inicia sesión</a></p>
    </div>
</div>

<style>
    .activation-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 20px;
    }

    .activation-card {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        max-width: 400px;
        width: 100%;
    }

    .activation-card h1 {
        font-size: 28px;
        font-weight: 600;
        color: #333;
        margin: 0 0 10px 0;
        text-align: center;
    }

    .subtitle {
        font-size: 14px;
        color: #666;
        text-align: center;
        margin-bottom: 30px;
    }

    .alerts-container {
        margin-bottom: 20px;
    }

    .alert {
        padding: 12px 16px;
        border-radius: 6px;
        margin-bottom: 10px;
        font-size: 14px;
    }

    .alert-error {
        background: #fee;
        color: #c33;
        border-left: 4px solid #c33;
    }

    .alert-success {
        background: #efe;
        color: #3c3;
        border-left: 4px solid #3c3;
    }

    .activation-form {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-bottom: 20px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        font-weight: 500;
        margin-bottom: 6px;
        color: #333;
        font-size: 14px;
    }

    .form-group input {
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        font-family: inherit;
        transition: border-color 0.2s;
    }

    .form-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn {
        padding: 12px 24px;
        border-radius: 6px;
        border: none;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-primary {
        background: #667eea;
        color: white;
    }

    .btn-primary:hover {
        background: #5568d3;
    }

    .login-link {
        text-align: center;
        font-size: 14px;
        color: #666;
    }

    .login-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
    }

    .login-link a:hover {
        text-decoration: underline;
    }
</style>
{% endblock main_content %}
