<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud Confirmada - CLUB LOBBY69</title>
    {% load static %}
    <style>
        * {margin:0;padding:0;box-sizing:border-box;}
        html, body {width:100%;height:100%;}
        body {
            font-family:'Segoe UI',Tahoma,Arial,sans-serif;
            background:linear-gradient(135deg,#0a0f1a 0%,#0f1628 50%,#1a2d4a 100%);
            background-attachment:fixed;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            padding:15px;
            min-height:100vh;
        }
        .header-logo {
            height:100px;
            margin-bottom:15px;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .header-logo img {max-height:100px;max-width:300px;object-fit:contain;}

              .confirmation-card {
            background:#fff;
            padding:30px;
            border-radius:12px;
            box-shadow:0 10px 40px rgba(0,0,0,0.3);
            max-width:550px;
            width:100%;
            text-align:center;
        }
        .success-icon {
            font-size:60px;
            color:#4caf50;
            margin-bottom:12px;
            font-weight:bold;
        }
        h1 {
            font-size:26px;
            font-weight:600;
            color:#0a0f1a;
            margin-bottom:8px;
        }
        .message {
            font-size:15px;
            color:#555;
            margin-bottom:25px;
        }
        .steps {
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:12px;
            margin:20px 0;
        }
        .step {
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:8px;
        }
        .step-number {
            width:45px;
            height:45px;
            border-radius:50%;
            background:#4682b4;
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:600;
            font-size:18px;
        }
        .step p {
            font-size:12px;
            color:#666;
            margin:0;
            line-height:1.3;
        }
        .note {
            font-size:12px;
            color:#666;
            margin:20px 0;
            padding:12px;
            background:#f5f5f5;
            border-radius:6px;
            border-left:4px solid #ffc107;
        }
        .btn {
            display:inline-block;
            padding:11px 28px;
            border-radius:6px;
            border:none;
            font-size:14px;
            font-weight:600;
            cursor:pointer;
            transition:all .2s;
            text-decoration:none;
            background:#4682b4;
            color:#fff;
            margin-top:15px;
        }
        .btn:hover {background:#35648a;}
        @media (max-width:768px){
            .steps{grid-template-columns:1fr;}
            .confirmation-card{padding:25px 15px;}
            h1{font-size:22px;}
            .message{font-size:14px;}
            .step-number{width:40px;height:40px;font-size:16px;}
            .step p{font-size:11px;}
        }
    </style>
</head>
<body>
    <div class="header-logo">
        <img src="{% static 'images/Logo-Lobby69.jpg' %}" alt="LOBBY69 Logo" onerror="this.style.display='none'">
    </div>
    <div class="confirmation-card">
        <div class="success-icon">✓</div>
        <h1>¡Solicitud Recibida!</h1>
        <p class="message">Hemos recibido tu solicitud de invitación.</p>
        <div class="steps">
            <div class="step">
                <div class="step-number">1</div>
                <p>Revisa tu correo</p>
            </div>
            <div class="step">
                <div class="step-number">2</div>
                <p>Haz clic en el enlace</p>
            </div>
            <div class="step">
                <div class="step-number">3</div>
                <p>¡Comienza!</p>
            </div>
        </div>
        <p class="note">📧 El enlace de activación expira en 7 días. Revisa SPAM si no lo ves.</p>
        <a href="/" class="btn">Volver al Inicio</a>
    </div>
</body>
</html>
