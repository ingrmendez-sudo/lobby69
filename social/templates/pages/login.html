{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CLUB LOBBY69</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            padding: 40px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo img {
            max-width: 150px;
            height: auto;
        }
        .logo h1 {
            font-size: 24px;
            color: #1a1a2e;
            margin-top: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #d946ef;
        }
        .helper-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .messages {
            margin-bottom: 20px;
        }
        .message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .message.error {
            background-color: #fee;
            color: #c33;
            border-left: 4px solid #c33;
        }
        .message.success {
            background-color: #efe;
            color: #3c3;
            border-left: 4px solid #3c3;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #d946ef 0%, #ec4899 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(217, 70, 239, 0.4);
        }
        .footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .footer-links a {
            color: #d946ef;
            text-decoration: none;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="{% static 'images/Logo-Lobby69.jpg' %}" alt="LOBBY69">
            <h1>CLUB LOBBY69</h1>
        </div>

        {% if messages %}
<div class="messages" id="messages-container">
    {% for message in messages %}
        <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">
            {{ message }}
        </div>
    {% endfor %}
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const messagesContainer = document.getElementById('messages-container');
        if (messagesContainer) {
            // Mostrar por 4 segundos y luego ocultar
            setTimeout(() => {
                messagesContainer.style.display = 'none';
            }, 4000);
        }
    });
</script>
{% endif %}


        <form method="POST" action="{% url 'pages:login' %}">
            {% csrf_token %}

            <div class="form-group">
                <label for="login_input">👤 Usuario o Email</label>
                <input
                    type="text"
                    id="login_input"
                    name="login_input"
                    placeholder="Ingresa tu usuario o email"
                    required
                >
                <div class="helper-text">
                    Puedes ingresar tu <strong>nick de usuario</strong> (ej: juan_perez) o tu <strong>email</strong> (ej: juan@example.com)
                </div>
            </div>

            <div class="form-group">
                <label for="password">🔐 Contraseña</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Ingresa tu contraseña"
                    required
                >
            </div>

            <button type="submit" class="submit-btn">🔓 Iniciar Sesión</button>
        </form>

        <div class="footer-links">
            <p>¿No tienes cuenta? <a href="{% url 'pages:solicitar' %}">Solicita una invitación</a></p>
        </div>
    </div>

</body>
</html>
